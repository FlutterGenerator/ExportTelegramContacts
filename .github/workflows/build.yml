name: Build & Release

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Path: ExportTelegramContacts.sln
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ${{ env.Solution_Path }}

      # ===== Build solution =====
      - name: Build solution
        run: msbuild ${{ env.Solution_Path }} /p:Configuration=${{ env.Configuration }} /p:Platform="Any CPU"

      # ===== Create Portable ZIP =====
      - name: Create Portable ZIP
        run: |
          powershell Compress-Archive `
            -Path ExportTelegramContacts/bin/${{ env.Configuration }}/* `
            -DestinationPath ExportTelegramContacts-portable.zip

      # ===== Locate MSI =====
      - name: Find MSI
        id: find_msi
        run: |
          $msi = Get-ChildItem -Path . -Recurse -Filter *.msi | Select-Object -First 1
          echo "MSI_PATH=$($msi.FullName)" >> $env:GITHUB_ENV

      # ===== Upload artifacts =====
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            ExportTelegramContacts-portable.zip
            ${{ env.MSI_PATH }}

      # ===== Create GitHub Release =====
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ExportTelegramContacts-portable.zip
            ${{ env.MSI_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
